<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#29156e" />
  <title>Cita Confirmada — Seal Services</title>
  <link rel="stylesheet" href="sosati-style.css" />
  <style>
    body { background: var(--brand); min-height: 100vh; }

    .confirm-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 80px;
    }

    /* HERO SUCCESS */
    .success-hero {
      width: 100%;
      background: linear-gradient(160deg, var(--brand) 0%, var(--brand-light) 100%);
      padding: 48px 24px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .success-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .success-hero::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 150px; height: 150px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .success-checkmark {
      width: 84px; height: 84px;
      background: var(--success);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 38px;
      box-shadow: 0 8px 32px rgba(16,185,129,0.5);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative; z-index: 1;
    }

    .success-hero h2 {
      font-family: var(--font-display);
      font-size: 26px;
      color: var(--white);
      margin-bottom: 8px;
      position: relative; z-index: 1;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .success-hero p {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      position: relative; z-index: 1;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    /* DETAIL CARD */
    .detail-card {
      width: calc(100% - 32px);
      max-width: 448px;
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin: -24px auto 16px;
      box-shadow: var(--shadow-lg);
      position: relative; z-index: 10;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-100);
    }

    .detail-row:last-child { border-bottom: none; padding-bottom: 0; }
    .detail-row:first-child { padding-top: 0; }

    .detail-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--brand-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .detail-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      color: var(--gray-400);
      margin-bottom: 2px;
    }

    .detail-value {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--gray-800);
      line-height: 1.4;
    }

    /* CONFIRMATION ID */
    .conf-id-box {
      width: calc(100% - 32px);
      max-width: 448px;
      margin: 0 auto 16px;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    .conf-id-inner {
      background: var(--brand-soft);
      border: 1.5px dashed var(--brand);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .conf-id-label { font-size: 11.5px; color: var(--brand); font-weight: 600; }
    .conf-id-value {
      font-family: monospace;
      font-size: 17px;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: 2px;
    }

    .copy-btn {
      background: var(--brand);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .copy-btn:hover { background: var(--brand-dark); }

    /* ACTIONS */
    .actions-area {
      width: calc(100% - 32px);
      max-width: 448px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.5s 0.35s ease both;
    }

    /* REMINDER BOX */
    .reminder-box {
      width: calc(100% - 32px);
      max-width: 448px;
      margin: 16px auto 0;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      animation: fadeUp 0.5s 0.4s ease both;
    }

    .reminder-box p {
      font-size: 12.5px;
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
    }

    .reminder-box strong { color: var(--white); }

    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="confirm-wrapper">

  <!-- SUCCESS HERO -->
  <div class="success-hero">
    <div class="success-checkmark">✅</div>
    <h2>¡Cita Agendada!</h2>
    <p>Te esperamos en Seal Services · Fresno, CA</p>
  </div>

  <!-- DETAIL CARD -->
  <div class="detail-card" id="detail-card">
    <!-- generado por JS -->
  </div>

  <!-- CONFIRMATION ID -->
  <div class="conf-id-box">
    <div class="conf-id-inner">
      <div>
        <div class="conf-id-label">Número de confirmación</div>
        <div class="conf-id-value" id="conf-id">—</div>
      </div>
      <button class="copy-btn" onclick="copyId()">Copiar</button>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions-area">
    <a href="tel:5592666555" class="btn btn-primary" style="text-align:center">
      📞 Llamar a la oficina
    </a>
    <a href="sosati-appointment.html" class="btn" style="background:rgba(255,255,255,0.15);color:white;text-align:center">
      + Agendar otra cita
    </a>
  </div>

  <!-- REMINDER -->
  <div class="reminder-box">
    <p>
      📌 <strong>Recuerda:</strong> Llega 10 minutos antes de tu cita.<br>
      Si necesitas cancelar o cambiar tu horario, llámanos al
      <strong>(559) 266-6555</strong> con anticipación.
    </p>
  </div>

</div>

<!-- TOAST -->
<div id="sosati-toast"></div>

<script src="sosati-core.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const raw = sessionStorage.getItem("sosati_last_appt");
    if (!raw) {
      // No hay cita — redirigir al formulario
      window.location.href = "sosati-appointment.html";
      return;
    }

    const appt = JSON.parse(raw);
    renderDetails(appt);
    document.getElementById("conf-id").textContent = appt.id;
  });

  function renderDetails(appt) {
    const serviceObj = SOSATI.config.services.find(s => s.id === appt.service);
    const icon = serviceObj?.icon || "🛠️";

    const rows = [
      { icon: "👤", label: "Nombre",   value: appt.name },
      { icon: "📞", label: "Teléfono", value: appt.phone },
      { icon: icon, label: "Servicio", value: appt.serviceLabel },
      { icon: "📅", label: "Fecha",    value: SOSATI.utils.formatDate(appt.date) },
      { icon: "🕐", label: "Horario",  value: appt.time },
      { icon: "📍", label: "Oficina",  value: appt.locationLabel }
    ];

    if (appt.notes) {
      rows.push({ icon: "📝", label: "Notas", value: appt.notes });
    }

    const card = document.getElementById("detail-card");
    card.innerHTML = rows.map(r => `
      <div class="detail-row">
        <div class="detail-icon">${r.icon}</div>
        <div>
          <div class="detail-label">${r.label}</div>
          <div class="detail-value">${r.value}</div>
        </div>
      </div>
    `).join("");
  }

  function copyId() {
    const id = document.getElementById("conf-id").textContent;
    navigator.clipboard?.writeText(id).then(() => {
      showToast("Número copiado al portapapeles ✓", "success");
    }).catch(() => {
      showToast("ID: " + id, "info");
    });
  }

  function showToast(msg, type = "info") {
    const t = document.getElementById("sosati-toast");
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ""; }, 3000);
  }
</script>
</body>
</html>
